<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listen-it-out</title>
  <meta name="description"
    content="AI-powered research agent — web search, video analysis, report synthesis, and podcast generation." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <!-- marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

  <!-- ── Ambient background orbs ── -->
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>
  <div class="bg-orb orb-3" aria-hidden="true"></div>

  <div class="app-shell">

    <!-- ══════════════════════════════════════════════
         HEADER
    ══════════════════════════════════════════════ -->
    <header class="site-header">
      <div class="logo-mark" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="13" stroke="url(#logoGrad)" stroke-width="2" />
          <path d="M9 14 C9 10.5 12 8 14 8 C16 8 19 10.5 19 14 C19 17.5 16 20 14 20" stroke="url(#logoGrad)"
            stroke-width="1.8" stroke-linecap="round" />
          <circle cx="14" cy="14" r="2.5" fill="url(#logoGrad)" />
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
              <stop stop-color="#818cf8" />
              <stop offset="1" stop-color="#a78bfa" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="header-text">
        <h1 class="site-title">Listen-it-out</h1>
        <span class="site-tagline">AI-powered · Multi-modal · Real-time</span>
      </div>
    </header>

    <!-- ══════════════════════════════════════════════
         INPUT CARD
    ══════════════════════════════════════════════ -->
    <section class="input-section" aria-label="Research input">
      <div class="card input-card">
        <div class="card-label">Research topic or YouTube URL — at least one required</div>

        <div class="field-group">
          <label for="topic-input" class="sr-only">Research topic</label>
          <div class="input-wrapper" id="topic-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5" />
                <path d="M11 11 L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
              </svg>
            </span>
            <input id="topic-input" type="text" class="text-input"
              placeholder="Research topic (optional if YouTube URL supplied)" autocomplete="off" spellcheck="false" />
          </div>

          <label for="video-input" class="sr-only">Optional YouTube URL</label>
          <div class="input-wrapper" id="video-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5" />
                <path d="M6.5 6 L10.5 8 L6.5 10 Z" fill="currentColor" />
              </svg>
            </span>
            <input id="video-input" type="url" class="text-input" placeholder="YouTube URL (optional)"
              autocomplete="off" />
          </div>
        </div>

        <button id="research-btn" class="research-btn" type="button">
          <span class="btn-idle">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M8 2 L8 14 M2 8 L14 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            Start Research
          </span>
          <span class="btn-loading" aria-hidden="true">
            <span class="btn-spinner"></span>
            Researching…
          </span>
        </button>
      </div>
    </section>

    <!-- ══════════════════════════════════════════════
         PROGRESS PANEL
    ══════════════════════════════════════════════ -->
    <section id="progress-section" class="progress-section hidden" aria-label="Research progress">
      <div class="section-header">
        <h2 class="section-title">Agent Pipeline</h2>
        <div class="overall-progress">
          <div class="progress-track">
            <div id="progress-bar" class="progress-fill" style="width:0%"></div>
          </div>
          <span id="progress-label" class="progress-pct">0%</span>
        </div>
      </div>

      <div class="steps-grid" id="steps-grid">
        <!-- Step cards injected by JS -->
      </div>
    </section>

    <!-- ══════════════════════════════════════════════
         RESULTS
    ══════════════════════════════════════════════ -->
    <section id="results-section" class="results-section hidden" aria-label="Research results">

      <!-- Report -->
      <div class="card results-card">
        <div class="results-card-header">
          <span class="results-icon" aria-hidden="true">📄</span>
          <h2 class="results-title">Research Report</h2>
        </div>
        <div id="report-content" class="report-body markdown-body"></div>
      </div>

      <!-- Podcast -->
      <div class="card podcast-card">
        <div class="results-card-header">
          <span class="results-icon" aria-hidden="true">🎙️</span>
          <h2 class="results-title">Podcast Episode</h2>
        </div>

        <!-- Audio player -->
        <div id="audio-player-wrap" class="audio-player-wrap hidden">
          <div class="audio-label">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path
                d="M2 4.5 C2 2.8 3.3 1.5 5 1.5 L9 1.5 C10.7 1.5 12 2.8 12 4.5 L12 9.5 C12 11.2 10.7 12.5 9 12.5 L5 12.5 C3.3 12.5 2 11.2 2 9.5 Z"
                stroke="currentColor" stroke-width="1.3" />
              <path d="M5 5 L5 9 M9 5 L9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
            </svg>
            Audio Playback
          </div>
          <audio id="podcast-audio" controls class="audio-element"></audio>
        </div>

        <!-- Script (Hidden per user request) -->
        <div class="script-label" style="display: none;">Dialogue Script</div>
        <div id="podcast-script" class="podcast-script-box" style="display: none;"></div>
      </div>

    </section>

    <!-- ══════════════════════════════════════════════
         ERROR TOAST
    ══════════════════════════════════════════════ -->
    <div id="error-toast" class="error-toast hidden" role="alert">
      <span class="toast-icon" aria-hidden="true">⚠️</span>
      <span id="error-message" class="toast-msg"></span>
      <button class="toast-close" id="toast-close" aria-label="Dismiss">✕</button>
    </div>

  </div><!-- /app-shell -->

  <script src="app.js"></script>
</body>

</html>
